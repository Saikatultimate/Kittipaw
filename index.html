<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kittipaw</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000; --bg-elevated: #0a0a0a; --border: #262626; --text-main: #ffffff; --text-muted: #888888;
        }
        body { font-family: 'JetBrains Mono', monospace; background-color: var(--bg); color: var(--text-main); }
        .font-display { font-family: 'Orbitron', sans-serif; }
        
        /* UI Styling */
        .input-wrapper { position: relative; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 0.75rem; overflow: visible; }
        .input-field { background: transparent; width: 100%; padding: 1rem 1.5rem; padding-right: 7rem; }
        
        .btn-action {
            position: absolute; right: -1px; top: 50%; transform: translateY(-50%) translateX(20%);
            background: var(--text-main); color: var(--bg); padding: 0.6rem 1.2rem; border-radius: 0 0.5rem 0.5rem 0;
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: 600; cursor: pointer;
            box-shadow: 4px 0 15px rgba(0,0,0,0.8); z-index: 20; min-width: 90px; text-align: center;
        }
        .btn-action:hover { background: #e0e0e0; }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

        .mode-pill { border: 1px solid var(--border); background: transparent; color: var(--text-muted); transition: all 0.2s; }
        .mode-pill.active { background: var(--text-main); color: var(--bg); border-color: var(--text-main); font-weight: 600; }

        .nav-item { color: var(--text-muted); transition: all 0.2s; }
        .nav-item:hover { color: var(--text-main); background: rgba(255,255,255,0.03); }

        .modal-panel { transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-panel.open { transform: translateY(0); }
        .overlay-bg { opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
        .overlay-bg.visible { opacity: 1; pointer-events: auto; }
        .service-tag { background: #141414; border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; font-size: 12px; }

        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 2s linear infinite; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <aside class="hidden md:flex flex-col w-64 border-r border-[var(--border)] bg-[var(--bg)]">
        <div class="p-6 border-b border-[var(--border)]">
            <h1 class="font-display text-xl tracking-wider">KITTIPAW</h1>
            <p class="text-xs text-[var(--text-muted)] mt-1">Open Source Downloader</p>
        </div>
        <nav class="flex-1 py-4 flex flex-col gap-1">
            <button onclick="UI.openModal('history')" class="nav-item flex items-center gap-3 px-6 py-3 text-sm">History</button>
            <button onclick="UI.openModal('about')" class="nav-item flex items-center gap-3 px-6 py-3 text-sm">About</button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-y-auto">
        <div class="flex-1 flex items-center justify-center p-4 pb-24 md:pb-4">
            <div class="w-full max-w-md flex flex-col items-center gap-8">
                
                <div class="flex flex-col items-center gap-4">
                    <img src="cattie.png" alt="Logo" class="w-24 h-24 object-contain">
                    <div class="text-center">
                        <h2 class="font-display text-2xl tracking-wide">KITTIPAW</h2>
                        <p class="text-xs text-[var(--text-muted)] mt-1 tracking-widest uppercase">Community Instance</p>
                    </div>
                </div>

                <div class="w-full space-y-4">
                    <div class="input-wrapper shadow-lg">
                        <input type="text" id="url-input" placeholder="paste the link here" class="input-field text-sm outline-none" autocomplete="off">
                        <button id="btn-action" class="btn-action">PASTE</button>
                    </div>
                    <div id="error-msg" class="text-center text-red-500 text-xs h-4 hidden px-2"></div>
                    <div class="flex justify-center gap-3">
                        <button class="mode-pill active px-6 py-2 rounded-full text-xs" data-mode="auto">AUTO</button>
                        <button class="mode-pill px-6 py-2 rounded-full text-xs" data-mode="audio">AUDIO</button>
                        <button class="mode-pill px-6 py-2 rounded-full text-xs" data-mode="mute">MUTE</button>
                    </div>
                </div>

                <div id="processing" class="hidden flex flex-col items-center gap-4 mt-4">
                    <div class="w-6 h-6 border-2 border-[var(--text-muted)] border-t-[var(--text-main)] rounded-full animate-spin-slow"></div>
                    <p class="text-xs text-[var(--text-muted)]" id="status-text">Processing...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Nav & Modals -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-[var(--bg-elevated)] border-t border-[var(--border)] grid grid-cols-2 text-xs">
        <button onclick="UI.openModal('history')" class="flex flex-col items-center justify-center py-3 nav-item">History</button>
        <button onclick="UI.openModal('about')" class="flex flex-col items-center justify-center py-3 nav-item">About</button>
    </nav>

    <div id="modal-overlay" class="overlay-bg fixed inset-0 bg-black/80 z-40" onclick="UI.closeModal()"></div>
    <div id="modal-container" class="modal-panel fixed bottom-0 left-0 right-0 md:relative mx-auto md:max-w-md bg-[var(--bg-elevated)] border border-[var(--border)] md:rounded-xl rounded-t-2xl z-50 shadow-2xl flex flex-col max-h-[80vh]">
        <div class="p-6 border-b border-[var(--border)] flex justify-between items-center">
            <h3 id="modal-title" class="font-display text-lg tracking-wide uppercase"></h3>
            <button onclick="UI.closeModal()" class="text-[var(--text-muted)] text-2xl">&times;</button>
        </div>
        <div id="modal-content" class="p-6 overflow-y-auto"></div>
    </div>

    <script>
        /* ===== LOGIC LAYER - ROBUST & SERVERLESS ===== */
        const Logic = {
            state: { mode: 'auto', processing: false, history: [] },
            
            // Our "Secret Weapon": A CORS Proxy that works reliably on GitHub Pages
            PROXY: "https://corsproxy.io/?",

            init() {
                this.state.history = JSON.parse(localStorage.getItem('kittipaw_history') || '[]');
            },

            async processUrl(url) {
                if (!this.isValidUrl(url)) return { success: false, error: "Invalid link." };

                try {
                    // 1. Construct the API URL (using official Cobalt API)
                    const apiUrl = 'https://api.cobalt.tools/api/json';
                    
                    // 2. Prepare the payload
                    const body = {
                        url: url,
                        vCodec: "h264",
                        vQuality: "1080",
                        aFormat: "mp3",
                        isAudioOnly: this.state.mode === 'audio',
                        isAudioMuted: this.state.mode === 'mute'
                    };

                    // 3. Fetch via Proxy to avoid CORS blocks
                    const response = await fetch(this.PROXY + encodeURIComponent(apiUrl), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });

                    // 4. Handle Response
                    const data = await response.json();

                    if (data.status === 'error') {
                        // If API fails, we throw a clear error
                        throw new Error(data.error.code || "API returned an error.");
                    }

                    if (data.status === 'redirect' || data.status === 'stream') {
                        return { success: true, url: data.url, filename: 'kittipaw_video' };
                    }

                    throw new Error("Unexpected response.");

                } catch (err) {
                    console.error(err);
                    return { success: false, error: "Processing failed. The service might be busy." };
                }
            },

            async forceDownload(url) {
                try {
                    UI.updateStatusText("Fetching file...");
                    
                    // 1. Fetch the actual video file via Proxy
                    const response = await fetch(this.PROXY + encodeURIComponent(url));
                    const blob = await response.blob();
                    
                    // 2. Trigger Browser Download
                    const blobUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = "kittipaw_download"; 
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(blobUrl);
                    
                    return true;
                } catch (e) {
                    // 3. Fallback: Open in new tab (User must Right Click -> Save As)
                    window.open(url, '_blank');
                    return false;
                }
            },

            isValidUrl(string) {
                try { new URL(string); return true; } catch (_) { return false; }
            },

            saveHistory() {
                localStorage.setItem('kittipaw_history', JSON.stringify(this.state.history));
            }
        };

        /* ===== UI LAYER ===== */
        const UI = {
            elements: {},

            init() {
                this.elements = {
                    input: document.getElementById('url-input'),
                    actionBtn: document.getElementById('btn-action'),
                    errorMsg: document.getElementById('error-msg'),
                    processing: document.getElementById('processing'),
                    statusText: document.getElementById('status-text'),
                    modeBtns: document.querySelectorAll('.mode-pill'),
                    modalContainer: document.getElementById('modal-container'),
                    modalOverlay: document.getElementById('modal-overlay'),
                    modalTitle: document.getElementById('modal-title'),
                    modalContent: document.getElementById('modal-content')
                };

                // Mode Selection
                this.elements.modeBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.elements.modeBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        Logic.state.mode = btn.dataset.mode;
                    });
                });

                // Input Logic
                this.elements.input.addEventListener('input', () => {
                    this.elements.actionBtn.textContent = this.elements.input.value ? "DOWNLOAD" : "PASTE";
                    this.hideError();
                });

                // Action Logic
                this.elements.actionBtn.addEventListener('click', async () => {
                    if (Logic.state.processing) return;

                    if (!this.elements.input.value) {
                        try {
                            const text = await navigator.clipboard.readText();
                            this.elements.input.value = text;
                            this.elements.actionBtn.textContent = "DOWNLOAD";
                        } catch (e) { this.showError("Cannot paste. Please paste manually."); }
                        return;
                    }

                    // Start Download
                    this.startProcessing();
                    const result = await Logic.processUrl(this.elements.input.value);
                    
                    if (result.success) {
                        await Logic.forceDownload(result.url);
                        Logic.state.history.unshift({ url: this.elements.input.value, date: new Date().toLocaleString() });
                        Logic.saveHistory();
                        this.stopProcessing(true);
                    } else {
                        this.stopProcessing(false, result.error);
                    }
                });
            },

            startProcessing() {
                Logic.state.processing = true;
                this.elements.processing.classList.remove('hidden');
                this.elements.actionBtn.disabled = true;
                this.elements.errorMsg.classList.add('hidden');
                this.elements.statusText.textContent = "Contacting API...";
            },

            stopProcessing(success, error = "") {
                Logic.state.processing = false;
                this.elements.processing.classList.add('hidden');
                this.elements.actionBtn.disabled = false;
                
                if (success) {
                    this.elements.input.value = "";
                    this.elements.actionBtn.textContent = "PASTE";
                } else {
                    this.showError(error);
                }
            },

            updateStatusText(t) { this.elements.statusText.textContent = t; },
            showError(m) { this.elements.errorMsg.textContent = m; this.elements.errorMsg.classList.remove('hidden'); },
            hideError() { this.elements.errorMsg.classList.add('hidden'); },

            openModal(type) {
                const titles = { history: "History", about: "About" };
                let content = "";
                
                if (type === 'history') {
                    content = Logic.state.history.length === 0 
                        ? '<div class="text-center text-[var(--text-muted)] py-8">No history yet</div>'
                        : Logic.state.history.map(i => `<div class="border-b border-[var(--border)] py-2 text-xs truncate">${i.url} <span class="text-[var(--text-muted)]">(${i.date})</span></div>`).join('');
                } else {
                    const services = ["YouTube", "TikTok", "Instagram", "Twitter/X", "Pinterest"];
                    content = `<div class="text-sm text-[var(--text-muted)]">Kittipaw is a simple media saver.</div>
                    <div class="mt-4 flex flex-wrap gap-2">${services.map(s => `<span class="service-tag">${s}</span>`).join('')}</div>`;
                }

                this.elements.modalTitle.textContent = titles[type];
                this.elements.modalContent.innerHTML = content;
                this.elements.modalOverlay.classList.add('visible');
                this.elements.modalContainer.classList.add('open');
            },

            closeModal() {
                this.elements.modalOverlay.classList.remove('visible');
                this.elements.modalContainer.classList.remove('open');
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            Logic.init();
            UI.init();
        });
    </script>
</body>
</html>
